<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سایت در دسترس نیست</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2b1a4a, #1a1a3e);
            color: #fff;
            text-align: center;
            direction: rtl;
        }

        .container {
            padding: 20px;
            animation: fadeIn 1s ease;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 0;
            color: #ff6b6b;
        }

        p {
            font-size: 1.5rem;
            margin: 20px 0;
            opacity: 0.9;
        }

        .emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 20px;
        }

        .small {
            font-size: 1rem;
            opacity: 0.6;
            margin-top: 40px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <span class="emoji">🔧</span>
        <h1>در حال بروزرسانی</h1>
        <p>سایت موقتاً در دسترس نیست.<br>لطفاً کمی بعد مراجعه کنید.</p>
        <p class="small">— تیم توسعه —</p>
    </div>
</body>

</html>
