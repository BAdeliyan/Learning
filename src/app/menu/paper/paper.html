<h1>Щ…ЩӮШ§Щ„ЩҮвҖҢЩҮШ§</h1>


<div class="flex-container">
    @for (item of papers; track item.id) {
    <div class="paper-box">
        <h3>{{ item.title }}</h3>
        <p>{{ item.summary }}</p>
        <small>{{ item.date }}</small>
        <br><br><br><br><br><br><br><br>
        <a class="box-link" [routerLink]="['/paper',item.id]">Щ…ШҙШ§ЩҮШҜЩҮ</a>

    </div>
    }@empty {
    <p>ЩҮЫҢЪҶ Щ…ЩӮШ§Щ„ЩҮвҖҢШ§ЫҢ ШЁШұШ§ЫҢ ЩҶЩ…Ш§ЫҢШҙ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ.</p>}
</div>
<br>
