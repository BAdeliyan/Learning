<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>در دسترس نیست</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 50px 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 4rem;
            margin: 0;
        }

        p {
            font-size: 1.3rem;
            opacity: 0.8;
            margin: 20px 0 0;
        }

        .icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="message-box">
        <span class="icon">⛔</span>
        <h1>در دسترس نیست</h1>
        <p>این سایت به‌طور موقت غیرفعال شده است.<br>لطفاً بعداً مراجعه کنید.</p>
    </div>
</body>

</html>
